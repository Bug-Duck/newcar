<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dot</title>
</head>
<body>
  <canvas height="900" width="1600" id="canvas"></canvas>
  <script type="module">
    import { createFastGLContext } from "../../packages/gl-support/dist/newcar-dl-support.mjs";

    const context = createFastGLContext(document.querySelector("#canvas"));
    context.beginPath();
    context.lineTo(200, 200);
    context.lineTo(400, 500)
    context.setStrokeColor(255, 0, 0, 1);
    context.setLineWidth(100);
    context.stroke();
  </script>
</body>
</html>
